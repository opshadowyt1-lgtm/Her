/* ── Heart characters ─────────────────────────────────────── */
const HEART_CHARS = ['♡','♥','❤','💗','💕','💓','🤍'];

function spawnHearts(container, count) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.className = 'floating-heart';
    el.textContent = HEART_CHARS[Math.floor(Math.random() * HEART_CHARS.length)];
    el.setAttribute('aria-hidden', 'true');
    const dur     = (Math.random() * 8 + 10).toFixed(1);
    const drift   = (Math.random() * 4 + 3).toFixed(1);
    const delay   = (Math.random() * 8).toFixed(1);
    const size    = (Math.random() * 0.7 + 0.55).toFixed(2);
    el.style.left = (Math.random() * 96 + 2) + '%';
    el.style.fontSize = size + 'rem';
    el.style.animationDuration = dur + 's, ' + drift + 's';
    el.style.animationDelay = delay + 's';
    container.appendChild(el);
  }
}

spawnHearts(document.getElementById('cover-hearts'), 55);
spawnHearts(document.getElementById('book-hearts'), 16);

/* ── Photo upload ─────────────────────────────────────────── */
function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const wrap = document.getElementById('cover-photo-wrap');
  wrap.querySelector('.photo-slot-hint').style.display = 'none';
  let img = wrap.querySelector('img');
  if (!img) { img = document.createElement('img'); wrap.appendChild(img); }
  img.src = url;
  img.alt = '';
}

}

  const interval = setInterval(() => {
    const el = document.createElement('span');

    el.style.color = 'rgba(220,100,130,.4)';
    el.style.pointerEvents = 'none';
    el.style.userSelect = 'none';
    hCont.appendChild(el);
    if (hCont.children.length > 14) hCont.removeChild(hCont.firstChild);
  }, 380);

  setTimeout(() => { popup.style.opacity = '0'; }, 3200);
  setTimeout(() => {
    clearInterval(interval);
    showPhase('phase-book');
    initBook();
  }, 3900);
}

/* ── Book System ───────────────────────────────────────────── */
const STICKERS = [
  '🌸','💗','🌷','💝','🦋','🌺','✨','💫','🩷','🫶',
  '💕','🌹','🌼','💖','🎀','🌙','⭐','🕊️','🌻','💐',
  '🍓','🫐','🌈','🦢','🐚','🪷','💞','🌛','🍬','🎵',
  '🪸','🌊','🍃','🌿','🫧','💎','🪽','🧸','🪄','💌',
];

const STORAGE_KEY = 'love-book-stickers';

let pages        = [];
let pageIndex    = 0;
let stickerData  = [];
let placingEmoji = null;
let draggingId   = null;
let dragOffset   = { x: 0, y: 0 };
let bookInited   = false;

function getPages(text) {
  const trimmed = text.trim();
  const result  = [];
  let i = 0;
  while (i < trimmed.length && result.length * CHARS_PER_PAGE < 100000) {
    let end = i + CHARS_PER_PAGE;
    if (end < trimmed.length) {
      const bp = trimmed.lastIndexOf('\n', end);
      if (bp > i + 100) { end = bp; }
      else {
        const sp = trimmed.lastIndexOf(' ', end);
        if (sp > i + 100) end = sp;
      }
    }
    result.push(trimmed.slice(i, end).trim());
    i = end;
  }
  return result;
}

function loadStickers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveStickers() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stickerData)); } catch {}
}

function initBook() {
  if (bookInited) return;
  bookInited = true;

  pages = getPages(LOVE_LETTER);
  stickerData = loadStickers();

  const grid = document.getElementById('sticker-grid');
  STICKERS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'sticker-btn';
    btn.textContent = emoji;
    btn.title = 'Place ' + emoji;
    btn.onclick = () => { startPlacing(emoji); };
    grid.appendChild(btn);
  });

  document.getElementById('book-card').addEventListener('click', handleCardClick);

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup',   onDragEnd);
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend',  onDragEnd);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goPage(1);
    if (e.key === 'ArrowLeft')  goPage(-1);
  });

  renderPage();
  renderDots();
}

function renderPage(direction) {
  const content = document.getElementById('page-content');
  content.className = '';
  void content.offsetWidth; // reflow trigger
  if (direction === 1)  content.className = 'page-enter-right';
  if (direction === -1) content.className = 'page-enter-left';

  const text = pages[pageIndex] || '';
  const paras = text.split(/\n\n+/).filter(Boolean);
  content.innerHTML = paras.map(p =>
    `<p style="font-family:'Lora',Georgia,serif;font-size:clamp(.85rem,2.2vw,1.02rem);color:#7a3d52;line-height:1.85;margin:0 0 1.1em;letter-spacing:.01em;">${escHtml(p.trim())}</p>`
  ).join('');

  document.getElementById('page-counter').textContent = (pageIndex + 1) + ' / ' + pages.length;
  document.getElementById('btn-prev').disabled = pageIndex === 0;
  document.getElementById('btn-next').disabled = pageIndex === pages.length - 1;

  renderStickers();
  renderDots();
}

function renderStickers() {
  const layer = document.getElementById('sticker-layer');
  layer.innerHTML = '';
  layer.style.pointerEvents = 'none';

  stickerData.filter(s => s.pageIndex === pageIndex).forEach(s => {
    const el = document.createElement('span');
    el.className = 'sticker-item';
    el.textContent = s.emoji;
    el.dataset.id = s.id;
    el.style.left      = s.x + '%';
    el.style.top       = s.y + '%';
    el.style.transform = `translate(-50%,-50%) rotate(${s.rotate}deg)`;
    el.style.pointerEvents = 'auto';

    el.addEventListener('mousedown',   e => startDrag(e, s.id));
    el.addEventListener('touchstart',  e => startTouchDrag(e, s.id), { passive: false });
    el.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); removeSticker(s.id); });
    layer.appendChild(el);
  });
}

function renderDots() {
  const wrap = document.getElementById('progress-dots');
  wrap.innerHTML = '';
  pages.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'prog-dot' + (i === pageIndex ? ' active' : '');
    btn.setAttribute('aria-label', 'Page ' + (i + 1));
    btn.onclick = () => { const dir = i > pageIndex ? 1 : -1; pageIndex = i; renderPage(dir); };
    wrap.appendChild(btn);
  });
}

function goPage(dir) {
  const next = pageIndex + dir;
  if (next < 0 || next >= pages.length) return;
  pageIndex = next;
  renderPage(dir);
}

/* ── Sticker placement ───────────────────────────────────────── */
function startPlacing(emoji) {
  placingEmoji = emoji;
  document.getElementById('sticker-picker').classList.remove('open');
  document.getElementById('btn-sticker').style.background = 'rgba(255,140,170,.35)';
  const hint = document.getElementById('placing-hint');
  hint.textContent = emoji + ' tap anywhere on the page to place ✦';
  hint.style.display = 'block';
  document.getElementById('book-card').style.cursor = 'crosshair';
}

function handleCardClick(e) {
  if (!placingEmoji) return;
  const card = document.getElementById('book-card');
  const rect  = card.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width)  * 100;
  const y = ((e.clientY - rect.top)  / rect.height) * 100;
  const newS = {
    id:        Date.now() + '-' + Math.random(),
    emoji:     placingEmoji,
    x, y,
    rotate:    Math.random() * 30 - 15,
    pageIndex,
  };
  stickerData.push(newS);
  saveStickers();
  placingEmoji = null;
  document.getElementById('placing-hint').style.display = 'none';
  document.getElementById('btn-sticker').style.background = 'rgba(255,220,230,.5)';
  document.getElementById('book-card').style.cursor = 'default';
  renderStickers();
}

function removeSticker(id) {
  stickerData = stickerData.filter(s => s.id !== id);
  saveStickers();
  renderStickers();
}

/* ── Drag (mouse) ────────────────────────────────────────────── */
function startDrag(e, id) {
  if (placingEmoji) return;
  e.stopPropagation();
  draggingId = id;
  const el   = e.currentTarget;
  const rect = el.getBoundingClientRect();
  dragOffset = { x: e.clientX - rect.left - rect.width/2, y: e.clientY - rect.top - rect.height/2 };
  el.classList.add('dragging');
}

function onDragMove(e) {
  if (!draggingId) return;
  const card = document.getElementById('book-card');
  const rect = card.getBoundingClientRect();
  const x = Math.max(2, Math.min(98, ((e.clientX - dragOffset.x - rect.left) / rect.width)  * 100));
  const y = Math.max(2, Math.min(98, ((e.clientY - dragOffset.y - rect.top)  / rect.height) * 100));
  const s = stickerData.find(s => s.id === draggingId);
  if (s) { s.x = x; s.y = y; }
  const el = document.querySelector(`.sticker-item[data-id="${draggingId}"]`);
  if (el) { el.style.left = x + '%'; el.style.top = y + '%'; }
}

function onDragEnd() {
  if (!draggingId) return;
  document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('dragging'));
  saveStickers();
  draggingId = null;
}

/* ── Drag (touch) ────────────────────────────────────────────── */
function startTouchDrag(e, id) {
  if (placingEmoji) return;
  e.preventDefault();
  e.stopPropagation();
  draggingId = id;
  const t    = e.touches[0];
  const el   = e.currentTarget;
  const rect = el.getBoundingClientRect();
  dragOffset = { x: t.clientX - rect.left - rect.width/2, y: t.clientY - rect.top - rect.height/2 };
}

function onTouchMove(e) {
  if (!draggingId) return;
  e.preventDefault();
  const t    = e.touches[0];
  const card = document.getElementById('book-card');
  const rect = card.getBoundingClientRect();
  const x = Math.max(2, Math.min(98, ((t.clientX - dragOffset.x - rect.left) / rect.width)  * 100));
  const y = Math.max(2, Math.min(98, ((t.clientY - dragOffset.y - rect.top)  / rect.height) * 100));
  const s = stickerData.find(s => s.id === draggingId);
  if (s) { s.x = x; s.y = y; }
  const el = document.querySelector(`.sticker-item[data-id="${draggingId}"]`);
  if (el) { el.style.left = x + '%'; el.style.top = y + '%'; }
}

/* ── Sticker picker toggle ───────────────────────────────────── */
function togglePicker() {
  const picker = document.getElementById('sticker-picker');
  picker.classList.toggle('open');
  placingEmoji = null;
  document.getElementById('placing-hint').style.display = 'none';
  document.getElementById('book-card').style.cursor = 'default';
  document.getElementById('btn-sticker').style.background =
    picker.classList.contains('open') ? 'rgba(255,140,170,.35)' : 'rgba(255,220,230,.5)';
}

/* ── Util ────────────────────────────────────────────────────── */
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
